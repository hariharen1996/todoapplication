<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>TodoApp</title>
  <link rel="stylesheet" href="index.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/5f59ca6ad3.js" crossorigin="anonymous"></script>
</head>

<body>
  <div class="todos-bg-container">
    <div class="container">
      <div class="row">
        <div class="col-12">
          <h1 class="todos-heading">Todos</h1>

          <h1 class="create-task-heading">
            Create <span class="create-task-heading-subpart">Task</span>
          </h1>

          <input type="text" id="todoUserInput" class="todo-user-input" />
          <button class="button" id="addBtn">Add</button>

          <h1 class="todo-items-heading">
            My <span class="todo-items-heading-subpart">Tasks</span>
          </h1>

          <div class="filters d-flex gap-3 align-items-center">
            <div class="filter-group">
              <label for="timeFilter" class="form-label fw-semibold">
                <i class="fas fa-clock me-1"></i> Filter by Time
              </label>
              <select id="timeFilter" class="form-select">
                <option value="all">All time</option>
                <option value="today">Today</option>
                <option value="week">Last 7 days</option>
                <option value="month">Last 30 days</option>
              </select>
            </div>

            <div class="filter-group">
              <label for="statusFilter" class="form-label fw-semibold">
                <i class="fas fa-tasks me-1"></i> Filter by Status
              </label>
              <select id="statusFilter" class="form-select">
                <option value="all">All tasks</option>
                <option value="completed">Completed</option>
                <option value="incomplete">Incomplete</option>
              </select>
            </div>

            <button id="applyFiltersBtn" class="btn btn-primary mt-4">Apply Filters</button>
          </div>

          <ul class="todo-items-container" id="todoItemsContainer"></ul>
          <button class="button" id="saveBtn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <div id="deleteToast"></div>
  <div id="localToast"></div>

  <script src="index.js"></script>
</body>

</html>
